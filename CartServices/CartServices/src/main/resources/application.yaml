server:
  port: 8083

spring:
  application:
    name: cart-service

  data:
    redis:
      host: ${SPRING_REDIS_HOST:localhost}
      port: 6379
      password: ${SPRING_REDIS_PASSWORD:redis123}
      timeout: 2000ms

cart:
  ttl-minutes: 1440    # Cart 24 hours ke baad expire hogi (1440 min)
  max-items: 50        # Ek cart mein max 50 items

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://admin:admin123@localhost:8761/eureka/}
    fetch-registry: true
    register-with-eureka: true
  instance:
    prefer-ip-address: true
    lease-renewal-interval-in-seconds: 10
    lease-expiration-duration-in-seconds: 30